exclude: ^(\.idea/|venv/|__pycache__/|tests/__pycache__/)

repos:
  - repo: local
    hooks:
      - id: ruff-local
        name: ruff (local)
        entry: python -m ruff check --fix
        language: system
        types: [python]

      - id: mypy-local
        name: mypy (local)
        entry: python -m mypy core.py ui.py main.py
        language: system
        pass_filenames: false


